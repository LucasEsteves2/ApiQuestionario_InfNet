name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: luqui25/lucas-fluminense-backend
  FRONTEND_IMAGE: luqui25/lucas-fluminense-frontend

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Back/QuestionarioOnline.sln

      - name: Build
        run: dotnet build Back/QuestionarioOnline.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Back/QuestionarioOnline.sln --no-build --configuration Release

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Define image tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Back
          file: ./Back/QuestionarioOnline/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.value }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Front
          file: ./Front/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.value }}