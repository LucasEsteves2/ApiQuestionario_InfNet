# ============================================================
# MONGODB - Deployment + Service + PersistentVolumeClaim
# ============================================================

# --- PersistentVolumeClaim ---
# Pede um "disco" pro Kubernetes guardar os dados do MongoDB.
# Sem isso, quando o pod reiniciar, todos os dados somem.
# É o equivalente ao "volumes: mongodb_data:/data/db" do docker-compose.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: questionario
spec:
  accessModes:
    - ReadWriteOnce        # Só um pod lę/escreve por vez
  resources:
    requests:
      storage: 1Gi         # Pede 1GB de disco

---

# --- Deployment ---
# Define QUANTOS pods rodar e COMO configurar cada um.
# O Deployment gerencia os pods: se um morrer, ele recria automaticamente.
# É o equivalente ao serviço "mongodb" do docker-compose.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: questionario
  labels:
    app: mongodb             # Label usada pelo Service pra encontrar este pod
spec:
  replicas: 1                # Quantas instâncias rodar (1 pro banco)
  selector:
    matchLabels:
      app: mongodb           # O Deployment gerencia pods com essa label
  template:
    metadata:
      labels:
        app: mongodb         # Label que identifica o pod
    spec:
      containers:
        - name: mongodb
          image: mongo:7                    # Mesma imagem do docker-compose
          ports:
            - containerPort: 27017         # Porta interna do container
          env:
            # Puxa os valores do Secret (em vez de hardcoded)
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: MONGO_DATABASE
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db           # Onde o MongoDB salva os dados
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-pvc          # Usa o disco que pedimos acima

---

# --- Service ---
# Cria um "DNS interno" pro MongoDB dentro do cluster.
# Outros pods acessam o banco pelo nome "mongodb" (em vez de IP).
# É o equivalente ŕ "network" do docker-compose.
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: questionario
spec:
  selector:
    app: mongodb             # Encontra pods com essa label
  ports:
    - port: 27017            # Porta que o Service expőe
      targetPort: 27017      # Porta do container
  type: ClusterIP            # Só acessível DENTRO do cluster (năo expőe pra fora)
