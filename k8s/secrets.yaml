# ============================================================
# SECRET - Armazena dados sensíveis (senhas, chaves) de forma
# segura no cluster. Os valores são codificados em base64.
# É o equivalente ao seu .env, mas dentro do Kubernetes.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: questionario-secrets
  namespace: questionario
type: Opaque
stringData:
  # stringData aceita texto puro (o K8s converte pra base64 sozinho)
  MONGO_INITDB_ROOT_USERNAME: mongoadmin
  MONGO_INITDB_ROOT_PASSWORD: mongosecret123
  MONGO_DATABASE: QuestionarioOnlineDb
  RABBITMQ_DEFAULT_USER: admin
  RABBITMQ_DEFAULT_PASS: admin123
  JWT_SECRET_KEY: SuaChaveSecretaSuperSeguraComPeloMenos256BitsParaGarantirSegurancaMaxima!
