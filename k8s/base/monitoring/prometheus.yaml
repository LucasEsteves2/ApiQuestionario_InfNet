# ============================================================
# PROMETHEUS - Sistema de Monitoramento e Alertas
# ============================================================
# O Prometheus coleta métricas da aplicaçăo (CPU, RAM, requests)
# e armazena em um banco de dados de séries temporais.
# O Grafana depois lę esses dados pra criar dashboards visuais.
# ============================================================

---
# ConfigMap - Configuraçăo do Prometheus
# Define QUAIS serviços o Prometheus vai monitorar (scrape targets)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: questionario
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s      # Coleta métricas a cada 15 segundos
      evaluation_interval: 15s  # Avalia regras a cada 15 segundos

    scrape_configs:
      # Monitora o próprio Prometheus
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Monitora o Backend (.NET)
      - job_name: 'backend'
        metrics_path: '/metrics'  # Endpoint de métricas do .NET
        static_configs:
          - targets: ['backend:5000']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: 'backend'

      # Monitora pods do Kubernetes
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - questionario
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

---
# PersistentVolumeClaim - Armazena dados do Prometheus
# REQUISITO DO TRABALHO: "Utilize um PVC para escrever os dados do Prometheus"
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: questionario
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi  # 2GB de armazenamento persistente

---
# Deployment - Pod do Prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: questionario
  labels:
    app: prometheus
spec:
  replicas: 1  # Prometheus geralmente roda 1 instância
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.48.0  # Imagem oficial do Prometheus
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'  # Onde salva os dados
            - '--storage.tsdb.retention.time=7d'  # Mantém dados por 7 dias
          ports:
            - containerPort: 9090
              name: web
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-data
              mountPath: /prometheus  # Montado no PVC (dados persistem!)
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          # Healthcheck - Verifica se Prometheus está respondendo
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-pvc  # Usa o PVC criado acima

---
# Service - Expőe Prometheus dentro do cluster
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: questionario
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      name: web
  type: ClusterIP  # Só acessível internamente (Grafana acessa)
