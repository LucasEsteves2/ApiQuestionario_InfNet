# ============================================================
# GRAFANA - Plataforma de Visualizaēćo de Métricas
# ============================================================
# O Grafana cria dashboards bonitos com os dados do Prometheus.
# REQUISITO: "Apenas o Grafana deverį ficar acessķvel fora do Cluster"
# ============================================================

---
# ConfigMap - Datasource (conecta Grafana ao Prometheus)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: questionario
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090  # URL do Prometheus no cluster
        isDefault: true
        editable: true

---
# ConfigMap - Dashboard pré-configurado (Kubernetes)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: questionario
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'Default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards

---
# Deployment - Pod do Grafana
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: questionario
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.2.2  # Imagem oficial do Grafana
          ports:
            - containerPort: 3000
              name: web
          env:
            # Credenciais padrćo (mude em produēćo!)
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin123"
            # Permite criaēćo de datasources via API
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_PATHS_PROVISIONING
              value: "/etc/grafana/provisioning"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          # Healthcheck - Verifica se Grafana estį respondendo
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-config
          configMap:
            name: grafana-dashboards

---
# Service - Expõe Grafana FORA do cluster (NodePort)
# REQUISITO: "Apenas o Grafana deverį ficar acessķvel para fora do Cluster"
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: questionario
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300  # Acessa em http://<minikube-ip>:30300
      name: web
  type: NodePort  # Exposto externamente!
