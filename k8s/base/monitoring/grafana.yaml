# ============================================================
# GRAFANA - Plataforma de Visualizaçăo de Métricas
# ============================================================
# O Grafana cria dashboards bonitos com os dados do Prometheus.
# REQUISITO: "Apenas o Grafana deverá ficar acessível fora do Cluster"
# ============================================================

---
# ConfigMap - Datasource (conecta Grafana ao Prometheus)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: questionario
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        uid: prometheus

---
# ConfigMap - Dashboard pré-configurado (Kubernetes)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: questionario
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

---
# ConfigMap - Dashboard JSON exemplo
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: questionario
data:
  kubernetes.json: |-
    {"title":"Questionario Online","uid":"questionario-k8s","tags":["kubernetes"],"timezone":"browser","schemaVersion":38,"refresh":"10s","panels":[{"id":1,"title":"CPU por Pod (%)","type":"timeseries","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"x":0,"y":0,"w":12,"h":8},"targets":[{"expr":"sum(rate(container_cpu_usage_seconds_total{namespace=\"questionario\",container!=\"\",container!=\"POD\"}[5m])) by (pod) * 100","legendFormat":"{{pod}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","color":{"mode":"palette-classic"}}}},{"id":2,"title":"Memoria por Pod (MB)","type":"timeseries","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"x":12,"y":0,"w":12,"h":8},"targets":[{"expr":"sum(container_memory_usage_bytes{namespace=\"questionario\",container!=\"\",container!=\"POD\"}) by (pod) / 1024 / 1024","legendFormat":"{{pod}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"decmbytes","color":{"mode":"palette-classic"}}}},{"id":3,"title":"Replicas do Backend","type":"stat","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"x":0,"y":8,"w":6,"h":4},"targets":[{"expr":"count(kube_pod_info{namespace=\"questionario\",pod=~\"backend.*\"})","refId":"A"}],"fieldConfig":{"defaults":{"unit":"short","thresholds":{"mode":"absolute","steps":[{"value":null,"color":"red"},{"value":4,"color":"green"}]},"color":{"mode":"thresholds"}}},"options":{"colorMode":"background","textMode":"auto"}},{"id":4,"title":"Pods Rodando","type":"stat","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"x":6,"y":8,"w":6,"h":4},"targets":[{"expr":"count(kube_pod_status_phase{namespace=\"questionario\",phase=\"Running\"})","refId":"A"}],"fieldConfig":{"defaults":{"unit":"short","thresholds":{"mode":"absolute","steps":[{"value":null,"color":"red"},{"value":1,"color":"green"}]},"color":{"mode":"thresholds"}}},"options":{"colorMode":"background","textMode":"auto"}}]}

---
# Deployment - Pod do Grafana
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: questionario
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.2.2
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin123
        - name: GF_PATHS_PROVISIONING
          value: /etc/grafana/provisioning
        volumeMounts:
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: dashboard-provider
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboards
          mountPath: /var/lib/grafana/dashboards
      volumes:
      - name: datasources
        configMap:
          name: grafana-datasources
      - name: dashboard-provider
        configMap:
          name: grafana-dashboard-provider
      - name: dashboards
        configMap:
          name: grafana-dashboard

---
# Service - Expőe Grafana FORA do cluster (NodePort)
# REQUISITO: "Apenas o Grafana deverá ficar acessível para fora do Cluster"
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: questionario
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30300
  selector:
    app: grafana
