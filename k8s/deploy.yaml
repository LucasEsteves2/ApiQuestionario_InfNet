# ============================================================
# DEPLOY COMPLETO - Questionario Online
# ============================================================
# USO: kubectl apply -f deploy.yaml
# ============================================================

# NAMESPACE
apiVersion: v1
kind: Namespace
metadata:
  name: questionario

---
# SECRETS
apiVersion: v1
kind: Secret
metadata:
  name: questionario-secrets
  namespace: questionario
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: mongoadmin
  MONGO_INITDB_ROOT_PASSWORD: mongosecret123
  MONGO_DATABASE: QuestionarioOnlineDb
  MONGO_CONNECTION_STRING: "mongodb://mongoadmin:mongosecret123@mongodb:27017"
  RABBITMQ_DEFAULT_USER: admin
  RABBITMQ_DEFAULT_PASS: admin123
  JWT_SECRET_KEY: SuaChaveSecretaSuperSeguraComPeloMenos256BitsParaGarantirSegurancaMaxima!

---
# MONGODB - PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: questionario
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# MONGODB - Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: questionario
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: MONGO_DATABASE
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-pvc

---
# MONGODB - Service (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: questionario
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP

---
# RABBITMQ - PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-pvc
  namespace: questionario
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi

---
# RABBITMQ - Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: questionario
  labels:
    app: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: RABBITMQ_DEFAULT_PASS
            - name: RABBITMQ_DEFAULT_VHOST
              value: "/"
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-pvc

---
# RABBITMQ - Service (NodePort)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: questionario
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: 31567
  type: NodePort

---
# BACKEND - Deployment (4 replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: questionario
  labels:
    app: backend
spec:
  replicas: 4
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: luqui25/lucas-fluminense-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: MONGO_CONNECTION_STRING
            - name: MongoDB__DatabaseName
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: MONGO_DATABASE
            - name: RabbitMQ__HostName
              value: "rabbitmq"
            - name: RabbitMQ__UserName
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: RABBITMQ_DEFAULT_PASS
          readinessProbe:
            httpGet:
              path: /api/questionario
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/questionario
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15

---
# BACKEND - Service (NodePort)
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: questionario
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 8080
      nodePort: 30500
  type: NodePort

---
# FRONTEND - Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: questionario
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: luqui25/lucas-fluminense-frontend:latest
          ports:
            - containerPort: 80

---
# FRONTEND - Service (NodePort)
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: questionario
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort

---
# PROMETHEUS - ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: questionario

---
# PROMETHEUS - ClusterRole (permissoes para coletar metricas)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  - nodes/metrics
  - services
  - endpoints
  - pods
  verbs: ["get", "list", "watch"]
- apiGroups: ["extensions"]
  resources:
  - ingresses
  verbs: ["get", "list", "watch"]
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]

---
# PROMETHEUS - ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: questionario

---
# PROMETHEUS - ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: questionario
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'backend'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['backend:5000']
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.kube-system.svc.cluster.local:8080']
      - job_name: 'kubelet-cadvisor'
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        metrics_path: /metrics/cadvisor
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - questionario
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true

---
# PROMETHEUS - PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: questionario
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
# PROMETHEUS - Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: questionario
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.48.0
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=7d'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-pvc

---
# PROMETHEUS - Service (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: questionario
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090

---
# GRAFANA - Datasource
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: questionario
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        uid: prometheus

---
# GRAFANA - Dashboard Provider
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: questionario
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

---
# GRAFANA - Dashboard JSON (carrega automaticamente!)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: questionario
data:
  kubernetes.json: |-
    {"title":"Questionario Online","uid":"questionario-k8s","tags":["kubernetes"],"timezone":"browser","schemaVersion":38,"refresh":"10s","panels":[{"id":1,"title":"CPU por Pod (%)","type":"timeseries","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"x":0,"y":0,"w":12,"h":8},"targets":[{"expr":"sum(rate(container_cpu_usage_seconds_total{namespace=\"questionario\",container!=\"\",container!=\"POD\"}[5m])) by (pod) * 100","legendFormat":"{{pod}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","color":{"mode":"palette-classic"}}}},{"id":2,"title":"Memoria por Pod (MB)","type":"timeseries","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"x":12,"y":0,"w":12,"h":8},"targets":[{"expr":"sum(container_memory_usage_bytes{namespace=\"questionario\",container!=\"\",container!=\"POD\"}) by (pod) / 1024 / 1024","legendFormat":"{{pod}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"decmbytes","color":{"mode":"palette-classic"}}}},{"id":3,"title":"Replicas do Backend","type":"stat","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"x":0,"y":8,"w":6,"h":4},"targets":[{"expr":"count(kube_pod_info{namespace=\"questionario\",pod=~\"backend.*\"})","refId":"A"}],"fieldConfig":{"defaults":{"unit":"short","thresholds":{"mode":"absolute","steps":[{"value":null,"color":"red"},{"value":4,"color":"green"}]},"color":{"mode":"thresholds"}}},"options":{"colorMode":"background","textMode":"auto","reduceOptions":{"calcs":["lastNotNull"]}}},{"id":4,"title":"Pods Rodando","type":"stat","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"x":6,"y":8,"w":6,"h":4},"targets":[{"expr":"count(kube_pod_status_phase{namespace=\"questionario\",phase=\"Running\"})","refId":"A"}],"fieldConfig":{"defaults":{"unit":"short","thresholds":{"mode":"absolute","steps":[{"value":null,"color":"red"},{"value":1,"color":"green"}]},"color":{"mode":"thresholds"}}},"options":{"colorMode":"background","textMode":"auto","reduceOptions":{"calcs":["lastNotNull"]}}},{"id":5,"title":"Restarts por Pod","type":"stat","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"x":12,"y":8,"w":6,"h":4},"targets":[{"expr":"sum(kube_pod_container_status_restarts_total{namespace=\"questionario\"}) by (pod)","legendFormat":"{{pod}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"short","thresholds":{"mode":"absolute","steps":[{"value":null,"color":"green"},{"value":3,"color":"yellow"},{"value":5,"color":"red"}]},"color":{"mode":"thresholds"}}},"options":{"colorMode":"background","textMode":"auto","reduceOptions":{"calcs":["lastNotNull"]}}},{"id":6,"title":"Network Recebido (bytes/s)","type":"timeseries","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"x":0,"y":12,"w":12,"h":8},"targets":[{"expr":"sum(rate(container_network_receive_bytes_total{namespace=\"questionario\"}[5m])) by (pod)","legendFormat":"{{pod}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"Bps","color":{"mode":"palette-classic"}}}},{"id":7,"title":"Network Enviado (bytes/s)","type":"timeseries","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"x":12,"y":12,"w":12,"h":8},"targets":[{"expr":"sum(rate(container_network_transmit_bytes_total{namespace=\"questionario\"}[5m])) by (pod)","legendFormat":"{{pod}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"Bps","color":{"mode":"palette-classic"}}}}]}

---
# GRAFANA - Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: questionario
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.2.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin123"
            - name: GF_PATHS_PROVISIONING
              value: "/etc/grafana/provisioning"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboard

---
# GRAFANA - Service (NodePort)
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: questionario
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
