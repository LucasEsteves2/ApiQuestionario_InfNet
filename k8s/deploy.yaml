# ============================================================
# DEPLOY COMPLETO - Questionário Online
# ============================================================
# Este arquivo contém TODOS os recursos do projeto.
# 
# USO:
#   kubectl apply -f deploy.yaml
#
# O Kubernetes lę cada recurso separado por "---" e cria
# na ordem que aparecem. Por isso a ordem importa:
# 1. Namespace primeiro (precisa existir antes de tudo)
# 2. Secrets (os Deployments văo ler deles)
# 3. Bancos de dados (Backend precisa deles prontos)
# 4. Aplicaçăo (Backend + Frontend)
# 5. Monitoramento (Prometheus + Grafana)
# ============================================================

# ????????????????????????????????????????????????????????????
# NAMESPACE
# ????????????????????????????????????????????????????????????
apiVersion: v1
kind: Namespace
metadata:
  name: questionario

---

# ????????????????????????????????????????????????????????????
# SECRETS
# ????????????????????????????????????????????????????????????
apiVersion: v1
kind: Secret
metadata:
  name: questionario-secrets
  namespace: questionario
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: mongoadmin
  MONGO_INITDB_ROOT_PASSWORD: mongosecret123
  MONGO_DATABASE: QuestionarioOnlineDb
  MONGO_CONNECTION_STRING: "mongodb://mongoadmin:mongosecret123@mongodb:27017"
  RABBITMQ_DEFAULT_USER: admin
  RABBITMQ_DEFAULT_PASS: admin123
  JWT_SECRET_KEY: SuaChaveSecretaSuperSeguraComPeloMenos256BitsParaGarantirSegurancaMaxima!

---

# ????????????????????????????????????????????????????????????
# BANCOS DE DADOS
# ????????????????????????????????????????????????????????????

# ????????????????????????????????????????????????????????????
# MONGODB - PersistentVolumeClaim
# ????????????????????????????????????????????????????????????
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: questionario
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---

# ????????????????????????????????????????????????????????????
# MONGODB - Deployment
# ????????????????????????????????????????????????????????????
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: questionario
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: MONGO_DATABASE
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-pvc

---

# ????????????????????????????????????????????????????????????
# MONGODB - Service
# ????????????????????????????????????????????????????????????
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: questionario
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP

---

# ????????????????????????????????????????????????????????????
# RABBITMQ - PersistentVolumeClaim
# ????????????????????????????????????????????????????????????
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-pvc
  namespace: questionario
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi

---

# ????????????????????????????????????????????????????????????
# RABBITMQ - Deployment
# ????????????????????????????????????????????????????????????
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: questionario
  labels:
    app: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: RABBITMQ_DEFAULT_PASS
            - name: RABBITMQ_DEFAULT_VHOST
              value: "/"
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-pvc

---

# ????????????????????????????????????????????????????????????
# RABBITMQ - Service
# ????????????????????????????????????????????????????????????
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: questionario
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: 31567
  type: NodePort

---

# ????????????????????????????????????????????????????????????
# APLICAÇĂO
# ????????????????????????????????????????????????????????????

# ????????????????????????????????????????????????????????????
# BACKEND - Deployment (4 réplicas)
# ????????????????????????????????????????????????????????????
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: questionario
  labels:
    app: backend
spec:
  replicas: 4
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: luqui25/lucas-fluminense-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: MONGO_CONNECTION_STRING
            - name: MongoDB__DatabaseName
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: MONGO_DATABASE
            - name: RabbitMQ__HostName
              value: "rabbitmq"
            - name: RabbitMQ__UserName
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: questionario-secrets
                  key: RABBITMQ_DEFAULT_PASS
          readinessProbe:
            httpGet:
              path: /api/questionario
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/questionario
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15

---

# ????????????????????????????????????????????????????????????
# BACKEND - Service (NodePort)
# ????????????????????????????????????????????????????????????
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: questionario
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 8080
      nodePort: 30500
  type: NodePort

---

# ????????????????????????????????????????????????????????????
# FRONTEND - Deployment
# ????????????????????????????????????????????????????????????
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: questionario
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: luqui25/lucas-fluminense-frontend:latest
          ports:
            - containerPort: 80

---

# ????????????????????????????????????????????????????????????
# FRONTEND - Service (NodePort)
# ????????????????????????????????????????????????????????????
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: questionario
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort

---

# ????????????????????????????????????????????????????????????
# MONITORAMENTO
# ????????????????????????????????????????????????????????????

# ????????????????????????????????????????????????????????????
# PROMETHEUS - ConfigMap
# ????????????????????????????????????????????????????????????
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: questionario
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'backend'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['backend:5000']

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - questionario

---

# ????????????????????????????????????????????????????????????
# PROMETHEUS - PersistentVolumeClaim
# ????????????????????????????????????????????????????????????
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: questionario
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---

# ????????????????????????????????????????????????????????????
# PROMETHEUS - Deployment
# ????????????????????????????????????????????????????????????
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: questionario
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.48.0
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=7d'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-pvc

---

# ????????????????????????????????????????????????????????????
# PROMETHEUS - Service (ClusterIP)
# ????????????????????????????????????????????????????????????
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: questionario
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP

---

# ????????????????????????????????????????????????????????????
# GRAFANA - ConfigMap (Datasource)
# ????????????????????????????????????????????????????????????
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: questionario
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

---

# ????????????????????????????????????????????????????????????
# GRAFANA - Deployment
# ????????????????????????????????????????????????????????????
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: questionario
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.2.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin123"
            - name: GF_PATHS_PROVISIONING
              value: "/etc/grafana/provisioning"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources

---

# ????????????????????????????????????????????????????????????
# GRAFANA - Service (NodePort)
# ????????????????????????????????????????????????????????????
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: questionario
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
  type: NodePort
