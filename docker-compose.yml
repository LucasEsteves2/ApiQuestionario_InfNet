version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: questionario-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - questionario-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: questionario-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - questionario-network

  # OPCIONAL: Descomentar para rodar API em container
  # api:
  #   build:
  #     context: .
  #     dockerfile: QuestionarioOnline/Dockerfile
  #   container_name: questionario-api
  #   ports:
  #     - "7001:8080"
  #   environment:
  #     - ASPNETCORE_ENVIRONMENT=Development
  #     - RabbitMQ__HostName=rabbitmq
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy
  #   networks:
  #     - questionario-network

  # OPCIONAL: Descomentar para rodar Workers em container
  # workers:
  #   build:
  #     context: .
  #     dockerfile: QuestionarioOnline.Workers.Function/Dockerfile
  #   container_name: questionario-workers
  #   environment:
  #     - RabbitMQ__HostName=rabbitmq
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy
  #   networks:
  #     - questionario-network

  backend:
    build:
      context: ./Back
      dockerfile: QuestionarioOnline/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017
      - MongoDB__DatabaseName=${MONGO_DATABASE}
      - RabbitMQ__HostName=rabbitmq
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - questionario-network

  frontend:
    build:
      context: ./Front
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - questionario-network

volumes:
  mongodb_data:
    driver: local
  rabbitmq_data:
    driver: local
  rabbitmq_logs:
    driver: local

networks:
  questionario-network:
    driver: bridge
